<!DOCTYPE html>
<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>GMM Teorinis-Chorinis | Valdymas</title>
    <style>
        :root { --pirmine: #1a5276; --auksas: #d4ac0d; }
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        header { background: var(--pirmine); color: white; padding: 2rem; text-align: center; border-bottom: 5px solid var(--auksas); }
        .admin-bar { background: #333; color: white; padding: 10px; text-align: center; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 1rem; background: white; border-radius: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        .btn { background: var(--pirmine); color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; text-decoration: none; display: inline-block; }
        
        /* Redagavimo stilius */
        [contenteditable="true"] { border: 2px dashed #3498db; padding: 5px; background: #fffde7; }
        #save-btn { background: #27ae60; display: none; margin-left: 10px; }
    </style>
</head>
<body>

<div class="admin-bar">
    <input type="password" id="pass" placeholder="Slaptažodis">
    <button class="btn" onclick="ijungtiRedagavima()">Redaguoti</button>
    <button id="save-btn" class="btn" onclick="isaugoti()">💾 IŠSAUGOTI PAKEITIMUS</button>
</div>

<header>
    <h1 id="h1" class="edit">Gargždų muzikos mokykla</h1>
    <p id="p1" class="edit">Teorinio-chorinio skyriaus virtuali mokymo(si) erdvė</p>
</header>

<div class="container">
    <div class="grid">
        <div class="card">
            <h2>🎹 Solfedžio</h2>
            <p id="t1" class="edit">Užduotys, diktantai ir pratimai.</p>
            <a href="#" class="btn">Atidaryti</a>
        </div>
        <div class="card">
            <h2>🎶 Choras</h2>
            <p id="t2" class="edit">Partitūros ir balsų įrašai.</p>
            <a href="#" class="btn">Dainuoti</a>
        </div>
    </div>
</div>

<script>
    function ijungtiRedagavima() {
        if (document.getElementById('pass').value === "muzika2026") {
            document.querySelectorAll('.edit').forEach(el => el.contentEditable = true);
            document.getElementById('save-btn').style.display = 'inline-block';
            alert("Redagavimas įjungtas! Pakeitę tekstą spauskite IŠSAUGOTI.");
        } else {
            alert("Neteisingas slaptažodis!");
        }
    }

    function isaugoti() {
        // Kadangi tai statinis GitHub puslapis, tikras išsaugojimas neįmanomas be serverio.
        // Šis mygtukas informuoja vartotoją, ką daryti.
        alert("DĖMESIO: Kad pakeitimai išliktų visam laikui, turite nukopijuoti šį tekstą ir įklijuoti į savo GitHub 'index.html' failą. \n\nNaršyklės atmintyje pakeitimai išliks iki puslapio perkrovimo.");
        console.log("Atnaujintas HTML turinys būtų čia. Jei reikia tikro išsaugojimo, tam reikia naudoti 'Google Sites' arba 'WordPress'.");
    }
</script>

</body>
</html>
